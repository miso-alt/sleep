  <title>おやすみナビ🌙</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: 'Noto Sans JP', -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Yu Gothic UI', system-ui, sans-serif;
      background: linear-gradient(160deg, #fde8f5 0%, #e8eeff 100%);
      min-height: 100vh;
      margin: 0;
      padding: 20px 16px 40px;
      line-height: 1.6;
      color: #444;
    }
    .wrap {
      max-width: 480px;
      margin: 0 auto;
    }
    h1 { text-align: center; font-size: 1.5rem; color: #c06aaa; margin-bottom: 4px; }
    .subtitle { text-align: center; font-size: 0.85rem; color: #aaa; margin-bottom: 20px; }

    .card {
      background: #fff;
      border-radius: 20px;
      padding: 20px;
      margin: 14px 0;
      box-shadow: 0 4px 18px rgba(180,130,200,0.12);
    }
    label {
      display: block;
      margin: 14px 0 6px;
      font-weight: 700;
      font-size: 0.9rem;
      color: #b06aaa;
    }
    input[type="time"], input[type="number"] {
      width: 100%;
      padding: 12px 14px;
      font-size: 16px;
      border: 2px solid #f0d6f5;
      border-radius: 14px;
      outline: none;
      transition: border 0.2s;
      background: #fdf6ff;
      color: #444;
    }
    input:focus { border-color: #c890d8; }

    .gender-toggle { display: flex; gap: 10px; margin: 6px 0 0; }
    .gender-btn {
      flex: 1;
      padding: 12px;
      font-size: 15px;
      font-weight: 700;
      border: 2px solid #f0d6f5;
      border-radius: 14px;
      background: #fdf6ff;
      color: #b06aaa;
      cursor: pointer;
      transition: all 0.18s;
      text-align: center;
    }
    .gender-btn.active {
      background: linear-gradient(135deg, #d98fd4, #8fa8e8);
      color: #fff;
      border-color: transparent;
      box-shadow: 0 3px 12px rgba(180,130,210,0.35);
    }

    button.go {
      width: 100%;
      padding: 14px;
      font-size: 16px;
      font-weight: 700;
      border: 0;
      border-radius: 16px;
      margin-top: 16px;
      cursor: pointer;
      background: linear-gradient(135deg, #d98fd4, #8fa8e8);
      color: #fff;
      letter-spacing: 0.05em;
      box-shadow: 0 4px 14px rgba(180,130,210,0.35);
      transition: transform 0.1s, box-shadow 0.1s;
    }
    button.go:active { transform: scale(0.98); box-shadow: none; }

    .pills { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 12px; }
    .pill {
      display: inline-block;
      padding: 5px 12px;
      border-radius: 999px;
      background: #f3e8ff;
      color: #a06ab4;
      font-size: 12px;
    }

    .result-good {
      background: linear-gradient(135deg, #f0fff4, #e8f8ff);
      border: 2px solid #b8ecd4;
      border-radius: 20px;
      padding: 20px;
      margin-top: 14px;
      box-shadow: 0 4px 18px rgba(100,200,160,0.12);
    }
    .result-warn {
      background: linear-gradient(135deg, #fff8f0, #fff0f8);
      border: 2px solid #ffd6b8;
      border-radius: 20px;
      padding: 20px;
      margin-top: 14px;
    }
    .result-ng {
      background: linear-gradient(135deg, #fff0f5, #fff5e8);
      border: 2px solid #ffb8c8;
      border-radius: 20px;
      padding: 20px;
      margin-top: 14px;
    }

    .result-title { font-size: 1.1rem; font-weight: 700; margin-bottom: 8px; }
    .command-box {
      background: rgba(255,255,255,0.7);
      border-radius: 14px;
      padding: 12px 16px;
      margin: 10px 0;
      font-size: 0.95rem;
    }
    .time { font-weight: 800; color: #9060c0; }

    .timeline-list { list-style: none; padding: 0; margin: 10px 0 0; }
    .timeline-list li {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 12px;
      border-radius: 12px;
      background: rgba(255,255,255,0.65);
      margin-bottom: 7px;
      font-size: 0.93rem;
    }
    .timeline-list li.sleep-onset {
      background: rgba(220,200,255,0.25);
      border: 1px dashed #d0b0e8;
      color: #888;
      font-size: 0.86rem;
    }
    .icon { font-size: 1.1rem; }
    .time-range { font-weight: 700; color: #9060c0; min-width: 110px; }

    .margin-bar-wrap { margin: 10px 0 4px; }
    .margin-label { font-size: 0.8rem; color: #888; margin-bottom: 4px; }
    .margin-bar-bg { height: 10px; border-radius: 999px; background: #eeddf7; overflow: hidden; }
    .margin-bar-fill {
      height: 100%; border-radius: 999px;
      background: linear-gradient(90deg, #c890d8, #8fa8e8);
      transition: width 0.6s ease;
    }

    .info-note {
      font-size: 0.8rem;
      color: #aaa;
      background: rgba(255,255,255,0.5);
      border-radius: 10px;
      padding: 8px 12px;
      margin-top: 10px;
    }

    .wind-down-box {
      background: rgba(255,255,255,0.6);
      border-radius: 14px;
      padding: 14px 16px;
      margin-top: 12px;
      font-size: 0.88rem;
    }
    .tip-title {
      font-weight: 700;
      color: #b06aaa;
      margin-bottom: 8px;
      font-size: 0.9rem;
    }
    .tip-row {
      display: flex;
      gap: 8px;
      align-items: flex-start;
      margin-bottom: 7px;
      color: #555;
      line-height: 1.5;
    }

    h3 { color: #b06aaa; font-size: 0.95rem; margin: 14px 0 6px; }
    p { margin: 6px 0; font-size: 0.92rem; }
  </style>
</head>
<body>
  <div class="wrap">
  <h1>🌙 おやすみナビ</h1>
  <p class="subtitle">たっぷり眠れる夜のスケジュールを一緒に考えるよ✨</p>

  <div class="card">
    <label>🙋 あなたは？</label>
    <div class="gender-toggle">
      <div class="gender-btn active" id="btn-male" onclick="setGender('male')">👦 男性</div>
      <div class="gender-btn" id="btn-female" onclick="setGender('female')">👧 女性</div>
    </div>

    <label>😤 今日のストレス</label>
    <div class="gender-toggle">
      <div class="gender-btn active" id="btn-stress-no" onclick="setStress(false)">😌 普通</div>
      <div class="gender-btn" id="btn-stress-yes" onclick="setStress(true)">😣 ストレスあり</div>
    </div>

    <label>🏠 帰宅時間</label>
    <input id="home" type="time" value="20:00" placeholder="HH:MM" pattern="[0-9]{2}:[0-9]{2}" />

    <label>☀️ 明日の起床時間</label>
    <input id="wake" type="time" value="06:00" placeholder="HH:MM" pattern="[0-9]{2}:[0-9]{2}" />

    <label>😴 確保したい睡眠時間（時間）</label>
    <input id="sleep" type="number" step="0.25" min="3" max="12" value="7.0" />

    <button class="go" onclick="plan()">今夜のプランを見る 🌛</button>
    <div class="pills">
      <span class="pill">💤 睡眠を最優先</span>
      <span class="pill">🌿 無理せず調整</span>
      <span class="pill">🫶 あなたのペースで</span>
    </div>
  </div>

  <div id="out"></div>

  </div><!-- /wrap -->

<script>
let gender = 'male';
let stressOn = false;

function setGender(g) {
  gender = g;
  document.getElementById('btn-male').classList.toggle('active', g === 'male');
  document.getElementById('btn-female').classList.toggle('active', g === 'female');
  savePrefs();
}

function setStress(on) {
  stressOn = on;
  document.getElementById('btn-stress-no').classList.toggle('active', !on);
  document.getElementById('btn-stress-yes').classList.toggle('active', on);
  savePrefs();
}

const stepIcons = {
  "軽い運動（エアロバイクなど）": "🏃",
  "風呂（湯船）": "🛁",
  "シャワー": "🚿",
  "ヘアケア・スキンケア": "💆‍♀️",
  "歯磨き": "🪥",
  "就寝準備（消灯）": "🌙",
  "スープ・軽食": "🍵",
};

const SLEEP_ONSET = 15; // 入眠潜時（消灯→実際に寝るまで）

function toMin(t) {
  const [h, m] = t.split(":").map(Number);
  return h * 60 + m;
}
function fmt(min) {
  min = ((min % 1440) + 1440) % 1440;
  return `${String(Math.floor(min / 60)).padStart(2, "0")}:${String(min % 60).padStart(2, "0")}`;
}

function getCandidates(g, stress) {
  const exerciseStep = { label: "軽い運動（エアロバイクなど）", dur: 15 };

  if (g === 'female') {
    return [
      { name: "理想プラン 🌟", steps: [
        ...(stress ? [exerciseStep] : []),
        { label: "食事", dur: 30 },
        { label: "風呂（湯船）", dur: 30 },
        { label: "ヘアケア・スキンケア", dur: 20 },
        { label: "歯磨き", dur: 3 },
        { label: "就寝準備（消灯）", dur: 10 },
      ]},
      { name: "標準プラン ✨", steps: [
        ...(stress ? [exerciseStep] : []),
        { label: "食事", dur: 30 },
        { label: "シャワー", dur: 12 },
        { label: "ヘアケア・スキンケア", dur: 20 },
        { label: "歯磨き", dur: 3 },
        { label: "就寝準備（消灯）", dur: 10 },
      ]},
      { name: "時短プラン 🌿", steps: [
        ...(stress ? [exerciseStep] : []),
        { label: "スープ・軽食", dur: 10 },
        { label: "シャワー", dur: 12 },
        { label: "ヘアケア・スキンケア", dur: 15 },
        { label: "歯磨き", dur: 3 },
        { label: "就寝準備（消灯）", dur: 10 },
      ]},
      { name: "シンプルプラン 🫧", steps: [
        { label: "シャワー", dur: 12 },
        { label: "ヘアケア・スキンケア", dur: 15 },
        { label: "歯磨き", dur: 3 },
        { label: "就寝準備（消灯）", dur: 10 },
      ]},
      { name: "最小プラン 🌙", steps: [
        { label: "歯磨き", dur: 3 },
        { label: "就寝準備（消灯）", dur: 10 },
      ]},
    ];
  } else {
    return [
      { name: "理想プラン 🌟", steps: [
        ...(stress ? [exerciseStep] : []),
        { label: "食事", dur: 30 },
        { label: "風呂（湯船）", dur: 35 },
        { label: "歯磨き", dur: 3 },
        { label: "就寝準備（消灯）", dur: 10 },
      ]},
      { name: "標準プラン ✨", steps: [
        ...(stress ? [exerciseStep] : []),
        { label: "食事", dur: 30 },
        { label: "シャワー", dur: 20 },
        { label: "歯磨き", dur: 3 },
        { label: "就寝準備（消灯）", dur: 10 },
      ]},
      { name: "時短プラン 🌿", steps: [
        ...(stress ? [exerciseStep] : []),
        { label: "スープ・軽食", dur: 10 },
        { label: "シャワー", dur: 20 },
        { label: "歯磨き", dur: 3 },
        { label: "就寝準備（消灯）", dur: 10 },
      ]},
      { name: "シンプルプラン 🫧", steps: [
        { label: "シャワー", dur: 20 },
        { label: "歯磨き", dur: 3 },
        { label: "就寝準備（消灯）", dur: 10 },
      ]},
      { name: "最小プラン 🌙", steps: [
        { label: "歯磨き", dur: 3 },
        { label: "就寝準備（消灯）", dur: 10 },
      ]},
    ];
  }
}

// ゆとり時間に応じたメインコメント
function getCommand(margin) {
  if (margin >= 120) return `余裕たっぷりだよ😊 ゆっくりお風呂に入って、のんびり過ごしてね。今日もお疲れさまでした！`;
  if (margin >= 30) return `少しゆとりはあるけど、ダラダラしすぎは禁物だよ✨ 動き出すタイミングを逃さないようにね。`;
  if (margin >= 15) return `あんまり余裕はないよ😅 スマホは後にして、サクサク動こう。`;
  if (margin >= 1)  return `かなりギリギリだよ💦 帰ったらすぐ動き始めてね。ちょっと油断すると睡眠が削れちゃう。`;
  return `今夜はほぼ余裕がないよ😣 できることだけサッと済ませて、とにかく早く横になってね。`;
}

      <div class="tip-row">📖 <span>紙の本や日記がおすすめ。今日あったことを書き出すと頭がスッキリするよ。</span></div>
      <div class="tip-row">🧘 <span>ストレッチ5分で体をほぐしてあげて。凝りも取れて眠りの質が上がるよ。</span></div>
      <div class="tip-row">☕ <span>温かい飲み物でゆっくり15分。ハーブティーやホットミルクが特におすすめ。</span></div>
      ${stressBlock}
      ${getTrivia()}
    `;
  }
  if (margin >= 30) {
    return `
      <div class="tip-title">🌿 ゆとり時間にできること</div>
      ${stress ? '' : sns}
      <div class="tip-row">🧘 <span>ストレッチ5分で体をほぐしてあげて。短くても効果あるよ。</span></div>

      ${getTrivia()}
    `;
  }
  if (margin >= 15) {
    return `
      <div class="tip-title">🌿 少しだけゆとりがあるよ</div>
      ${stress ? '' : sns}
      <div class="tip-row">☕ <span>温かい飲み物を一杯だけ。飲みながらゆっくり呼吸するだけでも全然違うよ。</span></div>

      ${getTrivia()}
    `;
  }
  return `

    <div class="tip-row">🌙 <span>今日はすぐ休むのが一番のケアだよ。よく頑張ったね、おやすみ🫶</span></div>
    ${stressBlock}
    ${getTrivia()}
  `;
}

function plan() {
  const home = toMin(document.getElementById("home").value);
  const wake = toMin(document.getElementById("wake").value);
  const sleepH = Number(document.getElementById("sleep").value);

  let wakeAbs = wake;
  if (wakeAbs <= home) wakeAbs += 1440;

  const totalSleepBlock = Math.round(sleepH * 60) + SLEEP_ONSET;
  const lightsOutAbs = wakeAbs - totalSleepBlock;

  const candidates = getCandidates(gender, stressOn);

  function buildSchedule(c) {
    const total = c.steps.reduce((s, x) => s + x.dur, 0);
    const available = lightsOutAbs - home;
    if (available < total) return null;
    let t = lightsOutAbs;
    const timeline = [];
    for (let i = c.steps.length - 1; i >= 0; i--) {
      const st = c.steps[i];
      const start = t - st.dur;
      timeline.push({ label: st.label, start, end: t });
      t = start;
    }
    timeline.reverse();
    return { available, total, lightsOutAbs, wakeAbs, timeline };
  }

  let chosen = null;
  for (const c of candidates) {
    const s = buildSchedule(c);
    if (s) { chosen = { plan: c, sched: s }; break; }
  }

  const out = document.getElementById("out");

  if (!chosen) {
    const deficit = Math.abs(lightsOutAbs - home);
    out.innerHTML = `
      <div class="result-ng">
        <div class="result-title">😢 ちょっと今夜は難しそう…</div>
        <div class="command-box">
          帰宅時間が <span class="time">${fmt(home)}</span> で、
          ${sleepH}時間しっかり眠るには <span class="time">${fmt(lightsOutAbs)}</span> までに消灯しないといけないんだけど…
          <br>約 <b>${deficit}分</b> ほど足りないみたい💦
        </div>
        <p>💡 睡眠時間を少し短くするか、もし可能なら早めに帰れると嬉しいな。体のためにできる範囲で休んでね🫶</p>
      </div>`;
    return;
  }

  const { plan, sched } = chosen;
  const margin = sched.available - sched.total;
  const barPct = Math.min(100, Math.round(margin / 90 * 100));
  const styleClass = margin >= 15 ? "result-good" : "result-warn";

  const lightsOffStep = sched.timeline.find(x => x.label === "就寝準備（消灯）");
  const sleepOnsetStart = lightsOffStep ? lightsOffStep.end : sched.lightsOutAbs;

  const lines = sched.timeline.map(x => {
    const icon = stepIcons[x.label] || "•";
    return `<li>
      <span class="icon">${icon}</span>
      <span class="time-range">${fmt(x.start)}〜${fmt(x.end)}</span>
      <span>${x.label}</span>
    </li>`;
  }).join("");

  const onsetLine = `<li class="sleep-onset">
    <span class="icon">💤</span>
    <span class="time-range">${fmt(sleepOnsetStart)}〜${fmt(sleepOnsetStart + SLEEP_ONSET)}</span>
    <span>寝付くまで（目安）</span>
  </li>`;

  const wakeupLine = `<li>
    <span class="icon">☀️</span>
    <span class="time-range">${fmt(sched.wakeAbs)}</span>
    <span>起床 — おはよう！</span>
  </li>`;

  const marginLabel = margin >= 30
    ? "（少しゆとりがあるよ）"
    : margin >= 10
    ? "（少しだけ余裕があるよ）"
    : "（すぐ動き始めてね💨）";

  out.innerHTML = `
    <div class="${styleClass}">
      <div class="result-title">${plan.name}</div>
      <div class="command-box">${getCommand(margin)}</div>

      <p>🛏️ 消灯リミット：<span class="time">${fmt(sched.lightsOutAbs)}</span>　☀️ 起床：<span class="time">${fmt(sched.wakeAbs)}</span></p>

      <div class="margin-bar-wrap">
        <div class="margin-label">ゆとり時間：${margin}分　${marginLabel}</div>
        <div class="margin-bar-bg"><div class="margin-bar-fill" style="width:${barPct}%"></div></div>
      </div>

      <h3>今夜のタイムライン</h3>
      <ul class="timeline-list">
        ${lines}
        ${onsetLine}
        ${wakeupLine}
      </ul>

      <div class="info-note">
        💡 消灯してからすぐ眠れるとは限らないから、約${SLEEP_ONSET}分の「寝付き時間」を含めて計算しているよ。横になったらスマホは遠ざけると早く眠れるよ🌛
      </div>

      <div class="wind-down-box">
        ${getWindDownTips(margin, stressOn)}
      </div>

      <p style="font-size:0.82rem;color:#aaa;margin-top:14px;">よく眠れますように🌟 おやすみなさい</p>
    </div>
  `;
}

function savePrefs() {
  localStorage.setItem('oyasumi_gender', gender);
  localStorage.setItem('oyasumi_stress', stressOn ? '1' : '0');
  localStorage.setItem('oyasumi_home', document.getElementById('home').value);
  localStorage.setItem('oyasumi_wake', document.getElementById('wake').value);
  localStorage.setItem('oyasumi_sleep', document.getElementById('sleep').value);
}

function loadPrefs() {
  const g = localStorage.getItem('oyasumi_gender');
  if (g) setGender(g);

  const s = localStorage.getItem('oyasumi_stress');
  if (s !== null) setStress(s === '1');

  const home = localStorage.getItem('oyasumi_home');
  if (home) document.getElementById('home').value = home;

  const wake = localStorage.getItem('oyasumi_wake');
  if (wake) document.getElementById('wake').value = wake;

  const sleep = localStorage.getItem('oyasumi_sleep');
  if (sleep) document.getElementById('sleep').value = sleep;
}

// 入力変更時に自動保存
document.addEventListener('DOMContentLoaded', () => {
  loadPrefs();
  ['home', 'wake', 'sleep'].forEach(id => {
    document.getElementById(id).addEventListener('change', savePrefs);
  });
});

};
const manifestBlob = new Blob([JSON.stringify(manifest)], { type: 'application/json' });
document.getElementById('manifest-link').href = URL.createObjectURL(manifestBlob);

// Service Worker（オフライン対応）
if ('serviceWorker' in navigator) {
  const swCode = `
    const CACHE = 'oyasumi-v1';
    self.addEventListener('install', e => {
      self.skipWaiting();
    });
    self.addEventListener('fetch', e => {
      e.respondWith(
        caches.match(e.request).then(r => r || fetch(e.request))
      );
    });
  `;
  const swBlob = new Blob([swCode], { type: 'application/javascript' });
  navigator.serviceWorker.register(URL.createObjectURL(swBlob)).catch(() => {});
}
</script>
